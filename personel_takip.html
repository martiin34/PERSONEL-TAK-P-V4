<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Takip</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f3f4f6;font-size:13px;}
header{background:#1e293b;color:white;padding:10px;display:flex;justify-content:space-between;align-items:center;}
.container-wrapper{display:flex;justify-content:center;width:100%;}
.container{padding:10px;width:100%;max-width:960px;background:white;margin:10px 0;border-radius:6px;box-sizing:border-box;}
input,select,button{padding:10px;margin:5px 0;box-sizing:border-box;font-size:13px;width:100%;}
button{background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;}
button:hover{background:#1d4ed8;}
.login{width:90%;max-width:320px;margin:50px auto;background:white;padding:15px;border-radius:6px;}
.table-container{overflow-x:auto;width:100%;}
table{border-collapse:collapse;width:100%;table-layout:auto;min-width:700px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;font-size:12px;white-space:normal;word-wrap:break-word;}
thead th{background:#1e293b;color:white;position:sticky;top:0;z-index:2;}
.photo{width:30px;height:30px;border-radius:6px;object-fit:cover;}
.icon-btn{background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;padding:2px 4px;font-size:11px;}
.icon-btn:hover{background:#1d4ed8;}
.detail-row td{background:#f9fafb;text-align:left;font-size:11px;}
.admin-panel{display:none;padding:15px;background:#eef2ff;border-radius:6px;margin-top:20px;}
@media(max-width:600px){
.container-wrapper{justify-content:flex-start;}
table, th, td{font-size:11px;padding:4px;}
.photo{width:25px; height:25px;}
input, button{font-size:12px; padding:8px;}
}
</style>
</head>
<body>

<header>
<div>Personel Takip</div>
<div id="headerBtns" style="display:none">
<button onclick="excel()">Excel</button>
<button onclick="saveToDrive()">Drive'a Kaydet</button>
<button onclick="logout()">Çıkış</button>
</div>
</header>

<div class="container-wrapper">
<div class="login" id="loginPage">
<h3>Giriş</h3>
<input id="user" type="text" placeholder="Kullanıcı Adı" required>
<input id="pass" type="password" placeholder="Şifre" required>
<button onclick="login()">Giriş</button>
<button onclick="loginAdmin()" style="background:#f59e0b;margin-top:5px;">Admin Girişi</button>
</div>
</div>

<div class="container-wrapper">
<div id="app" class="container" style="display:none">
<h3>Personel Ekle</h3>
<input id="ad" placeholder="Ad">
<input id="tel" placeholder="Telefon">
<input id="maas" type="number" placeholder="Maaş">
<input id="mesaiUcret" type="number" placeholder="Mesai Saat Ücreti">
<input id="devUcret" type="number" placeholder="Devamsızlık Ücret">
<input type="file" id="foto">
<button onclick="personelEkle()">Personel Ekle</button>

<hr>
<h3>İşlem</h3>
<select id="personelSelect"></select>
<select id="islemTip">
<option value="mesai">Mesai</option>
<option value="avans">Avans</option>
<option value="dev">Devamsızlık</option>
</select>
<input id="islemDeger" type="number" placeholder="Değer">
<button onclick="islemEkle()">İşlem Ekle</button>

<hr>
<input id="arama" placeholder="Personel Ara" onkeyup="render()">

<div class="table-container">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Ad</th>
<th>Telefon</th>
<th>Maaş</th>
<th>Mesai</th>
<th>Avans</th>
<th>Dev</th>
<th>Net</th>
<th>Detay</th>
<th>Sil</th>
</tr>
</thead>
<tbody id="liste"></tbody>
</table>
</div>

<div class="admin-panel" id="adminPanel">
<h3>Admin Paneli</h3>
<input id="newUser" placeholder="Yeni Kullanıcı Adı">
<input id="newPass" type="password" placeholder="Yeni Şifre">
<button onclick="addUser()">Kullanıcı Ekle</button>
</div>
</div>
</div>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let data = JSON.parse(localStorage.getItem("personel"))||[];
let users = JSON.parse(localStorage.getItem("users"))||[];
const defaultAdmin = {user:"elisa", pass:"147852"};
if(users.length===0){users.push({user:"user1", pass:"123456"}); localStorage.setItem("users", JSON.stringify(users));}

let accessToken = null;

// Giriş fonksiyonları
function login(){
const u = document.getElementById("user").value;
const p = document.getElementById("pass").value;
if(users.find(x=>x.user===u && x.pass===p)){showApp(); alert("Hoşgeldiniz "+u);}
else alert("Kullanıcı bulunamadı!");
}
function loginAdmin(){
const u = document.getElementById("user").value;
const p = document.getElementById("pass").value;
if(u===defaultAdmin.user && p===defaultAdmin.pass){
document.getElementById("adminPanel").style.display="block";
showApp();
alert("Admin girişi başarılı");
}else alert("Hatalı admin kullanıcı veya şifre");
}

function logout(){location.reload();}
function hesapla(p){p.net = p.maas + p.mesai - p.avans - p.dev;}

// Personel ekleme
function personelEkle(){
let reader = new FileReader(), file = foto.files[0];
reader.onload=function(e){
let p={ad:ad.value, tel:tel.value, maas:Number(maas.value)||0, mesaiSaat:Number(mesaiUcret.value)||0, devBaz:Number(devUcret.value)||0, mesai:0, avans:0, dev:0, h:[], foto:e.target.result};
hesapla(p); data.push(p); localStorage.setItem("personel", JSON.stringify(data)); render();
}
if(file){reader.readAsDataURL(file);}else{reader.onload({target:{result:""}});}
}

// İşlem ekleme
function islemEkle(){
let i=personelSelect.value, tip=islemTip.value, v=Number(islemDeger.value), p=data[i], tut=0;
if(tip==="mesai"){tut=v*p.mesaiSaat;p.mesai+=tut;}
if(tip==="avans"){tut=v;p.avans+=tut;}
if(tip==="dev"){tut=v*p.devBaz;p.dev+=tut;}
p.h.push({t:new Date().toLocaleDateString(), tip:tip, v:v, tut:tut});
hesapla(p); localStorage.setItem("personel", JSON.stringify(data)); islemDeger.value=""; render();
}

// Render tablo
function render(){
let aramaText = arama.value.toLowerCase();
liste.innerHTML=""; personelSelect.innerHTML="";
data.forEach((p,i)=>{
if(!p.ad.toLowerCase().includes(aramaText)) return;
liste.innerHTML+=`<tr>
<td>${p.foto?'<img src="'+p.foto+'" class="photo">':''}</td>
<td>${p.ad}</td>
<td>${p.tel}</td>
<td>${p.maas.toLocaleString('tr-TR',{minimumFractionDigits:2})}₺</td>
<td>${p.mesai.toLocaleString('tr-TR',{minimumFractionDigits:2})}₺</td>
<td>${p.avans.toLocaleString('tr-TR',{minimumFractionDigits:2})}₺</td>
<td>${p.dev.toLocaleString('tr-TR',{minimumFractionDigits:2})}₺</td>
<td>${p.net.toLocaleString('tr-TR',{minimumFractionDigits:2})}₺</td>
<td><button class="icon-btn" onclick="toggleDetailRow(${i})">👁</button>
<button class="icon-btn" onclick="yazdirDetay(${i})">🖨</button></td>
<td><button class="icon-btn" onclick="sil(${i})">🗑</button></td>
</tr>`;
let detayHtml=p.h.map(x=>`${x.t} - ${x.tip} - ${x.v} - ${x.tut.toLocaleString('tr-TR',{minimumFractionDigits:2})}₺`).join("<br>")||"Detay yok";
liste.innerHTML+=`<tr id="detail-${i}" class="detail-row" style="display:none;"><td colspan="10">${detayHtml}</td></tr>`;
personelSelect.innerHTML+=`<option value="${i}">${p.ad}</option>`;
})
}

// Sil
function sil(i){if(confirm("Silmek istiyor musunuz?")){data.splice(i,1); localStorage.setItem("personel", JSON.stringify(data)); render();}}

// Excel
function excel(){
let ws=[["Ad","Tel","Maaş","Mesai","Avans","Dev","Net"]];
data.forEach(p=>{ws.push([p.ad,p.tel,p.maas,p.mesai,p.avans,p.dev,p.net]);});
const wsheet=XLSX.utils.aoa_to_sheet(ws), wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,wsheet,"Personel");
XLSX.writeFile(wb,"personel.xlsx");
}

// Admin kullanıcı ekleme
function addUser(){
const u=document.getElementById("newUser").value;
const p=document.getElementById("newPass").value;
if(!u||!p){alert("Kullanıcı adı ve şifre girin"); return;}
if(users.find(x=>x.user===u)){alert("Kullanıcı zaten var"); return;}
users.push({user:u, pass:p}); localStorage.setItem("users", JSON.stringify(users));
alert("Kullanıcı eklendi: "+u);
document.getElementById("newUser").value=""; document.getElementById("newPass").value="";
}

// App görünümü
function showApp(){document.getElementById("loginPage").style.display="none";document.getElementById("app").style.display="block";document.getElementById("headerBtns").style.display="block"; render();}
function toggleDetailRow(rowId){const detailRow=document.getElementById("detail-"+rowId);detailRow.style.display=(detailRow.style.display==="table-row")?"none":"table-row";}
function yazdirDetay(i){alert("Detay yazdırma mevcut değil. CSV veya Excel kullanın.");}

// Google Drive Kaydet
function saveToDrive(){
if(!accessToken){authorizeDrive();}
else{uploadCSV();}
}

// OAuth
function authorizeDrive(){
const clientId="1096679562163-c240sf5sh87aka0jt8rgkn8rt9deelpn.apps.googleusercontent.com";
const redirectUri=window.location.origin;
const oauth2Endpoint="https://accounts.google.com/o/oauth2/v2/auth";
const params={client_id:clientId,redirect_uri:redirectUri,response_type:"token",scope:"https://www.googleapis.com/auth/drive.file",include_granted_scopes:"true"};
window.location=`${oauth2Endpoint}?${new URLSearchParams(params).toString()}`;
}

// Token al
window.onload=()=>{
if(window.location.hash){
const hash=new URLSearchParams(window.location.hash.slice(1));
accessToken=hash.get("access_token");
window.location.hash=""; 
if(accessToken) alert("Drive erişimi sağlandı!");
}
}

// CSV yükleme
function uploadCSV(){
if(!accessToken) return alert("Drive erişimi yok!");
let csvContent="Ad,Tel,Maaş,Mesai,Avans,Dev,Net\n";
data.forEach(r=>{csvContent+=`${r.ad},${r.tel},${r.maas},${r.mesai},${r.avans},${r.dev},${r.net}\n`;});
const blob=new Blob([csvContent],{type:"text/csv"});
const metadata={name:"personel_takip.csv",mimeType:"text/csv"};
const form=new FormData();
form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
form.append('file',blob);
fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
method:'POST', headers:{Authorization:'Bearer '+accessToken}, body:form
}).then(res=>res.json()).then(()=>alert("Drive'a kaydedildi!")).catch(err=>console.error(err));
}
</script>

</body>
</html>
