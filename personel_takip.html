 <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personel Takip Cloud v24</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .panel { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .panel h4 { margin-top: 0; margin-bottom: 15px; color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 10px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1; min-width: 140px; font-size: 15px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-excel { background: #1f6e43; color: white; }
        .btn-info { background: #95a5a6; color: white; }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; color: #7f8c8d; text-transform: uppercase; font-size: 11px; }
        .auth-box { width: 92%; max-width: 400px; margin: 80px auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .auth-box input { width: 100%; margin-bottom: 15px; }
        #loadingOverlay { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column; font-weight:bold; }
    </style>
</head>
<body>

<div id="loadingOverlay">🔄 Veriler Güncelleniyor...</div>

<header>
    <div style="font-weight: bold;">🌍 Personel Takip</div>
    <div id="topNav" style="display:none; gap: 5px;">
        <button onclick="exportToExcel()" class="btn-excel">Excel Listesi</button>
        <button onclick="logout()" class="btn-danger">Çıkış</button>
    </div>
</header>

<div class="container">
    <div id="loginPage" class="auth-box">
        <h2>Sistem Girişi</h2>
        <input id="authEmail" type="email" placeholder="E-posta">
        <input id="authPass" type="password" placeholder="Şifre">
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="flex:1" onclick="login()">Giriş</button>
            <button class="btn-info" style="flex:1" onclick="forgotPassword()">Şifre Unuttum</button>
        </div>
    </div>

    <div id="app" style="display:none">
        <div id="adminOnlyPanel" class="panel" style="display:none; border: 2px solid var(--accent);">
            <h4>🛡️ Admin Kontrol</h4>
            <div class="form-row">
                <input id="newAdminEmail" type="email" placeholder="Yeni E-posta">
                <input id="newAdminPass" type="password" placeholder="Yeni Şifre">
                <button class="btn-main" onclick="addNewAdmin()">Kullanıcı Oluştur</button>
            </div>
        </div>

        <div class="panel">
            <h4>➕ Yeni Personel Kaydı</h4>
            <div class="form-row">
                <input id="pAd" placeholder="Ad Soyad">
                <input id="pMaas" type="number" placeholder="Sabit Maaş">
                <input id="pMesaiUcret" type="number" placeholder="Saatlik Mesai ₺">
                <input id="pDevGunluk" type="number" placeholder="Günlük Kesinti ₺">
                <button class="btn-success" onclick="personelEkle()">Buluta Gönder</button>
            </div>
        </div>

        <div class="panel">
            <h4>💰 Maaş İşlemleri</h4>
            <div class="form-row">
                <select id="pSelect"></select>
                <select id="islemTip">
                    <option value="mesai">Mesai Ekle (Saat)</option>
                    <option value="avans">Avans Ver (₺)</option>
                    <option value="dev_gun">Devamsızlık (Gün)</option>
                </select>
                <input id="islemMiktar" type="number" placeholder="Miktar">
                <button class="btn-main" style="flex:1 1 100%" onclick="islemYap()">İşlemi Kaydet</button>
            </div>
        </div>

        <div class="panel">
            <h4>📋 Güncel Personel Listesi</h4>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>Ad Soyad</th><th>Maaş</th><th>Mesai(+)</th><th>Kesinti(-)</th><th>Net Maaş</th><th>Sil</th></tr>
                    </thead>
                    <tbody id="liste"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC__15sb5F4OAMkWfrZIRXfJyGDCkehI84",
        authDomain: "personeltakip-7e75d.firebaseapp.com",
        databaseURL: "https://personeltakip-7e75d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "personeltakip-7e75d",
        storageBucket: "personeltakip-7e75d.firebasestorage.app",
        messagingSenderId: "353570405561",
        appId: "1:353570405561:web:e2dd0fb27a5cff07926f68"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Sabit Admin Bilgileri
    const DEFAULT_ADMIN = { email: "admin@test.com", pass: "1234" };
    let currentUser = sessionStorage.getItem("v24_user");

    function login() {
        const email = authEmail.value;
        const pass = authPass.value;

        // Önce Firebase'deki ek adminlere bak
        db.ref('admins').once('value', (snap) => {
            let admins = snap.val() ? Object.values(snap.val()) : [];
            
            // Sabit admini listeye ekle (Böylece veritabanı boş olsa da girer)
            admins.push(DEFAULT_ADMIN);

            let user = admins.find(a => a.email == email && a.pass == pass);
            
            if(user) {
                sessionStorage.setItem("v24_user", email.replace(/\./g, '_'));
                location.reload();
            } else {
                alert("Giriş Başarısız!");
            }
        });
    }

    if(currentUser) {
        loginPage.style.display = "none";
        app.style.display = "block";
        topNav.style.display = "flex";
        // Sadece admin@test.com giriş yaparsa kullanıcı ekleme paneli görünür
        if(currentUser === "admin@test_com") adminOnlyPanel.style.display = "block";
        verileriGetir();
    }

    function forgotPassword() {
        let email = prompt("E-posta giriniz:");
        if(!email) return;
        if(email === DEFAULT_ADMIN.email) return alert("Şifreniz: " + DEFAULT_ADMIN.pass);
        
        db.ref('admins').once('value', (snap) => {
            let user = Object.values(snap.val() || {}).find(a => a.email === email);
            if(user) alert("Şifreniz: " + user.pass);
            else alert("Kayıt bulunamadı.");
        });
    }

    function personelEkle() {
        if(!pAd.value || !pMaas.value) return;
        db.ref('personeller/' + currentUser).push({
            ad: pAd.value, maas: +pMaas.value, mUcret: +pMesaiUcret.value,
            devGunluk: +pDevGunluk.value, mesai: 0, avans: 0, dev: 0, net: +pMaas.value
        });
        ["pAd", "pMaas", "pMesaiUcret", "pDevGunluk"].forEach(id => document.getElementById(id).value = "");
    }

    function islemYap() {
        if(!pSelect.value || !islemMiktar.value) return;
        const pid = pSelect.value;
        const miktar = +islemMiktar.value;
        const tip = islemTip.value;
        db.ref('personeller/' + currentUser + '/' + pid).once('value', (snap) => {
            let p = snap.val();
            if(tip == "mesai") p.mesai += (miktar * (p.mUcret || 0));
            else if(tip == "avans") p.avans += miktar;
            else if(tip == "dev_gun") p.dev += (miktar * (p.devGunluk || 0));
            p.net = p.maas + p.mesai - (p.avans + p.dev);
            db.ref('personeller/' + currentUser + '/' + pid).set(p);
            islemMiktar.value = "";
        });
    }

    function verileriGetir() {
        loadingOverlay.style.display = "flex";
        db.ref('personeller/' + currentUser).on('value', (snap) => {
            const data = snap.val();
            renderList(data);
            loadingOverlay.style.display = "none";
        });
    }

    function renderList(data) {
        liste.innerHTML = "";
        pSelect.innerHTML = '<option value="">Personel Seçin...</option>';
        if(!data) return;
        Object.keys(data).forEach(id => {
            let p = data[id];
            pSelect.innerHTML += `<option value="${id}">${p.ad}</option>`;
            liste.innerHTML += `<tr>
                <td><b>${p.ad}</b></td><td>${p.maas}₺</td><td>${p.mesai}₺</td><td>${p.avans+p.dev}₺</td><td><b>${p.net}₺</b></td>
                <td><button class="btn-danger" onclick="sil('${id}')">X</button></td></tr>`;
        });
    }

    function sil(id) { if(confirm("Silinsin mi?")) db.ref('personeller/' + currentUser + '/' + id).remove(); }
    
    function addNewAdmin() {
        if(!newAdminEmail.value || !newAdminPass.value) return;
        db.ref('admins').push({ email: newAdminEmail.value, pass: newAdminPass.value });
        alert("Kullanıcı Oluşturuldu.");
        newAdminEmail.value = ""; newAdminPass.value = "";
    }
    
    function logout() { sessionStorage.clear(); location.reload(); }

    function exportToExcel() {
        db.ref('personeller/' + currentUser).once('value', (snap) => {
            let data = snap.val();
            if(!data) return alert("Veri yok.");
            let csv = "\ufeffAd Soyad;Maas;Mesai;Kesinti;Net\n";
            Object.values(data).forEach(p => csv += `${p.ad};${p.maas};${p.mesai};${p.avans+p.dev};${p.net}\n`);
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
            a.download = "liste.csv"; a.click();
        });
    }
</script>
</body>
</html>
