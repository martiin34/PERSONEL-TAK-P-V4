<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personel Takip Sistemi v14</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .panel { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .panel h4 { margin-top: 0; margin-bottom: 15px; color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 10px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1; min-width: 160px; font-size: 16px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 14px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-print { background: #7f8c8d; color: white; }
        @media (min-width: 768px) { .btn-success { width: auto; } }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; color: #7f8c8d; text-transform: uppercase; font-size: 11px; }
        .auth-box { width: 92%; max-width: 380px; margin: 80px auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .auth-box input { width: 100%; margin-bottom: 15px; }
        #adminOnlyPanel { border: 2px dashed var(--accent); background: #f0faff; }
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea { display: block !important; visibility: visible; position: absolute; left: 0; top: 0; width: 100%; padding: 30px; }
            #printArea * { visibility: visible; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2rem;">👤 Personel Takip</div>
    <div id="topNav" style="display:none">
        <button onclick="logout()" class="btn-danger" style="padding: 6px 12px;">Çıkış</button>
    </div>
</header>

<div class="container">
    <div id="loginPage" class="auth-box">
        <h2 style="color: var(--primary); margin-bottom: 25px;">Sistem Girişi</h2>
        <input id="authEmail" type="email" placeholder="E-posta">
        <input id="authPass" type="password" placeholder="Şifre">
        <button class="btn-main" style="width:100%" onclick="login()">Giriş Yap</button>
    </div>

    <div id="app" style="display:none">
        <div id="adminOnlyPanel" class="panel" style="display:none">
            <h4>🔑 Yeni Kullanıcı Tanımla</h4>
            <div class="form-row">
                <input id="newAdminEmail" type="email" placeholder="Yeni E-posta">
                <input id="newAdminPass" type="password" placeholder="Yeni Şifre">
                <button class="btn-main" onclick="addNewAdmin()">Kaydet</button>
            </div>
        </div>

        <div class="panel">
            <h4>➕ Personel Kayıt</h4>
            <div class="form-row">
                <input id="pAd" placeholder="Ad Soyad">
                <input id="pMaas" type="number" placeholder="Sabit Maaş">
                <input id="pMesaiUcret" type="number" placeholder="Saatlik Mesai Ücreti">
                <input id="pDevGunluk" type="number" placeholder="1 Günlük Devamsızlık Bedeli">
                <button class="btn-success" onclick="personelEkle()">Kaydet</button>
            </div>
        </div>

        <div class="panel">
            <h4>💰 İşlem Uygula</h4>
            <div class="form-row">
                <select id="pSelect"></select>
                <select id="islemTip">
                    <option value="mesai">Mesai (Saat)</option>
                    <option value="avans">Avans (₺)</option>
                    <option value="dev_gun">Devamsızlık (Gün)</option>
                </select>
                <input id="islemMiktar" type="number" placeholder="Miktar (Saat/Gün/₺)">
                <button class="btn-main" style="flex: 1 1 100%;" onclick="islemYap()">Kaydet</button>
            </div>
        </div>

        <div class="panel">
            <h4>📋 Maaş Çizelgesi</h4>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Ad Soyad</th>
                            <th>Maaş</th>
                            <th>Mesai</th>
                            <th>Avans</th>
                            <th>Kesinti</th>
                            <th>Net</th>
                            <th style="text-align:right">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="liste"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="printArea">
    <div style="border: 4px solid #000; padding: 40px; background: white; min-height: 500px;">
        <h1 style="text-align:center; text-decoration: underline;">MAAŞ ÖDEME BORDROSU</h1>
        <div id="printContent" style="font-size:1.4rem; line-height:2.5;"></div>
        <br><br><br>
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <p>YÖNETİCİ ONAY</p>
            <p>PERSONEL İMZA</p>
        </div>
    </div>
</div>

<script>
    const SUPER_ADMIN = "admin@test.com";
    let admins = JSON.parse(localStorage.getItem("v14_admins")) || [{email: SUPER_ADMIN, pass: "1234"}];
    let allData = JSON.parse(localStorage.getItem("v14_data")) || [];
    let currentUser = sessionStorage.getItem("v14_user");

    function login() {
        let user = admins.find(a => a.email == authEmail.value && a.pass == authPass.value);
        if(user) { sessionStorage.setItem("v14_user", user.email); currentUser = user.email; initApp(); }
        else alert("Giriş hatalı!");
    }

    function initApp() {
        if(!currentUser) return;
        loginPage.style.display = "none";
        app.style.display = "block";
        topNav.style.display = "flex";
        if(currentUser === SUPER_ADMIN) document.getElementById("adminOnlyPanel").style.display = "block";
        render();
    }

    function addNewAdmin() {
        admins.push({ email: newAdminEmail.value, pass: newAdminPass.value });
        localStorage.setItem("v14_admins", JSON.stringify(admins));
        alert("Kullanıcı eklendi.");
        newAdminEmail.value = ""; newAdminPass.value = "";
    }

    function personelEkle() {
        if(!pAd.value || !pMaas.value || !pDevGunluk.value) return alert("Lütfen tüm alanları doldurun!");
        allData.push({
            id: Date.now(), owner: currentUser,
            ad: pAd.value, maas: +pMaas.value, mUcret: +pMesaiUcret.value,
            devGunluk: +pDevGunluk.value, mesai: 0, avans: 0, dev: 0, net: +pMaas.value
        });
        save();
        ["pAd", "pMaas", "pMesaiUcret", "pDevGunluk"].forEach(id => document.getElementById(id).value = "");
    }

    function islemYap() {
        if(!pSelect.value) return;
        let p = allData.find(x => x.id == pSelect.value);
        let val = +islemMiktar.value;
        if(islemTip.value == "mesai") p.mesai += (val * p.mUcret);
        else if(islemTip.value == "avans") p.avans += val;
        else if(islemTip.value == "dev_gun") p.dev += (val * p.devGunluk);
        p.net = p.maas + p.mesai - p.avans - p.dev;
        save();
        islemMiktar.value = "";
    }

    function render() {
        let myData = allData.filter(p => p.owner === currentUser);
        liste.innerHTML = "";
        pSelect.innerHTML = '<option value="">Personel Seçin...</option>';
        myData.forEach(p => {
            pSelect.innerHTML += `<option value="${p.id}">${p.ad}</option>`;
            liste.innerHTML += `<tr>
                <td><b>${p.ad}</b></td>
                <td>${p.maas}₺</td>
                <td style="color:var(--success)">+${p.mesai}₺</td>
                <td style="color:var(--danger)">-${p.avans}₺</td>
                <td style="color:var(--danger)">-${p.dev}₺</td>
                <td><b>${p.net}₺</b></td>
                <td style="text-align:right">
                    <button class="btn-print" onclick="detay(${p.id})">📄</button>
                    <button class="btn-danger" onclick="sil(${p.id})">X</button>
                </td></tr>`;
        });
    }

    function detay(id) {
        let p = allData.find(x => x.id == id);
        document.getElementById("printContent").innerHTML = `
            <p><b>PERSONEL:</b> ${p.ad.toUpperCase()}</p>
            <p><b>AYLIK SABİT MAAŞ:</b> ${p.maas} ₺</p>
            <p><b>MESAİ TOPLAMI:</b> ${p.mesai} ₺</p>
            <p><b>TOPLAM KESİNTİ (AVANS+DEVAMSIZLIK):</b> ${p.avans + p.dev} ₺</p>
            <hr>
            <h2 style="font-size: 2rem;">NET ÖDENECEK: ${p.net} ₺</h2>
        `;
        window.print();
    }

    function sil(id) { if(confirm("Silmek istediğinize emin misiniz?")) { allData = allData.filter(x => x.id !== id); save(); } }
    function save() { localStorage.setItem("v14_data", JSON.stringify(allData)); render(); }
    function logout() { sessionStorage.clear(); location.reload(); }
    if(currentUser) initApp();
</script>
</body>
</html>
