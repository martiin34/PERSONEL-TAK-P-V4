<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Takip</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f3f4f6;font-size:13px;}
header{background:#1e293b;color:white;padding:10px;width:100%;display:flex;justify-content:space-between;align-items:center;}
.container-wrapper{display:flex;justify-content:center;width:100%;}
.container{padding:10px;width:100%;max-width:960px;box-sizing:border-box;background:white;margin:10px 0;border-radius:6px;}
input,select,button{padding:10px;margin:5px 0;box-sizing:border-box;font-size:13px;width:100%;}
button{background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;}
button:hover{background:#1d4ed8;}
.login{width:90%;max-width:320px;margin:50px auto;background:white;padding:15px;border-radius:6px;}
.table-container{overflow-x:auto;width:100%;}
table{border-collapse:collapse;width:100%;table-layout:auto;min-width:700px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;font-size:12px;white-space:normal;word-wrap:break-word;}
thead th{background:#1e293b;color:white;position:sticky;top:0;z-index:2;}
.photo{width:30px;height:30px;border-radius:6px;object-fit:cover;}
.icon-btn{background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;padding:2px 4px;font-size:11px;}
.icon-btn:hover{background:#1d4ed8;}
.detail-row td{background:#f9fafb;text-align:left;font-size:11px;}
@media(max-width:600px){
.container-wrapper{justify-content:flex-start;}
table, th, td{font-size:11px;padding:4px;}
.photo{width:25px; height:25px;}
input, button{font-size:12px; padding:8px;}
}
</style>
</head>
<body>

<header>
<div>Personel Takip</div>
<div id="headerBtns" style="display:none">
<button onclick="excel()">Excel</button>
<button onclick="logout()">Çıkış</button>
</div>
</header>

<div class="container-wrapper">
<div class="login" id="loginPage">
<h3>Giriş</h3>
<input id="user" type="email" placeholder="Email" required>
<input id="pass" type="password" placeholder="Şifre" required>
<button onclick="login()">Giriş</button>
<button type="button" onclick="sifreReset()" style="background:#f59e0b;margin-top:5px;">Şifre Sıfırla</button>
</div>
</div>

<div class="container-wrapper">
<div id="app" class="container" style="display:none">
<h3>Personel Ekle</h3>
<input id="ad" placeholder="Ad">
<input id="tel" placeholder="Telefon">
<input id="maas" type="number" placeholder="Maaş">
<input id="mesaiUcret" type="number" placeholder="Mesai Saat Ücreti">
<input id="devUcret" type="number" placeholder="Devamsızlık Ücret">
<input type="file" id="foto">
<button onclick="personelEkle()">Personel Ekle</button>

<hr>
<h3>İşlem</h3>
<select id="personelSelect"></select>
<select id="islemTip">
<option value="mesai">Mesai</option>
<option value="avans">Avans</option>
<option value="dev">Devamsızlık</option>
</select>
<input id="islemDeger" type="number" placeholder="Değer">
<button onclick="islemEkle()">İşlem Ekle</button>

<hr>
<input id="arama" placeholder="Personel Ara" onkeyup="render()">

<div class="table-container">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Ad</th>
<th>Telefon</th>
<th>Maaş</th>
<th>Mesai</th>
<th>Avans</th>
<th>Dev</th>
<th>Net</th>
<th>Detay</th>
<th>Sil</th>
</tr>
</thead>
<tbody id="liste"></tbody>
</table>
</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyDuT34Y5OH8btCP_nRqgtAl2FA8UtJftwE",
authDomain:"personel-takip-adc2e.firebaseapp.com",
projectId:"personel-takip-adc2e",
};
firebase.initializeApp(firebaseConfig);
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let data=JSON.parse(localStorage.getItem("personel"))||[];

function save(){localStorage.setItem("personel",JSON.stringify(data))}

// Oturum kontrolü
firebase.auth().onAuthStateChanged(user=>{
if(user){loginPage.style.display="none";app.style.display="block";headerBtns.style.display="block"; render();}
else{loginPage.style.display="block";app.style.display="none";headerBtns.style.display="none";}
});

function login(){
let email=user.value, password=pass.value;
if(!email || !password){alert("Email ve Şifre gerekli"); return;}
firebase.auth().signInWithEmailAndPassword(email,password)
.catch(err=>alert(err.message));
}

function sifreReset(){
let email=prompt("Şifre sıfırlama için email giriniz:");
if(email)firebase.auth().sendPasswordResetEmail(email).then(()=>alert("Şifre sıfırlama maili gönderildi")).catch(e=>alert(e.message));
}

function logout(){firebase.auth().signOut();}

function hesapla(p){p.net=Number(p.maas)+Number(p.mesai)-Number(p.avans)-Number(p.dev)}

function personelEkle(){
let reader=new FileReader(), file=foto.files[0];
reader.onload=function(e){
let p={ad:ad.value,tel:tel.value,maas:Number(maas.value)||0,mesaiSaat:Number(mesaiUcret.value)||0,devBaz:Number(devUcret.value)||0,mesai:0,avans:0,dev:0,h:[],foto:e.target.result};
hesapla(p); data.push(p); save(); render();
}
if(file){reader.readAsDataURL(file);}else{reader.onload({target:{result:""}});}
}

function islemEkle(){
let i=personelSelect.value, tip=islemTip.value, v=Number(islemDeger.value), p=data[i], tut=0;
if(tip=="mesai"){tut=v*p.mesaiSaat;p.mesai+=tut;}
if(tip=="avans"){tut=v;p.avans+=tut;}
if(tip=="dev"){tut=v*p.devBaz;p.dev+=tut;}
p.h.push({t:new Date().toLocaleDateString(),tip:tip,v:v,tut:tut});
hesapla(p); save(); islemDeger.value="";
render();
}

function toggleDetailRow(rowId){
const detailRow=document.getElementById("detail-"+rowId);
if(detailRow.style.display==="table-row"){detailRow.style.display="none";}
else{detailRow.style.display="table-row";}
}

function yazdirDetay(i){
let p=data[i];
let content=`<h3>${p.ad} Detay</h3>`;
if(p.h.length===0){content+="<p>Detay yok</p>";}
else{
content+="<table border='1' style='width:100%;border-collapse:collapse;'><tr><th>Tarih</th><th>Tip</th><th>Değer</th><th>Tutar</th></tr>";
p.h.forEach(x=>{content+=`<tr><td>${x.t}</td><td>${x.tip}</td><td>${x.v}</td><td>${x.tut}₺</td></tr>`;});
content+="</table>";
}
let w=window.open(); w.document.write(content); w.print(); w.close();
}

function render(){
let aramaText=arama.value.toLowerCase();
liste.innerHTML=""; personelSelect.innerHTML="";
data.forEach((p,i)=>{
if(!p.ad.toLowerCase().includes(aramaText)) return;
// Ana satır
liste.innerHTML+=`
<tr>
<td>${p.foto?'<img src="'+p.foto+'" class="photo">':''}</td>
<td>${p.ad}</td>
<td>${p.tel}</td>
<td>${p.maas}</td>
<td>${p.mesai}</td>
<td>${p.avans}</td>
<td>${p.dev}</td>
<td>${p.net}</td>
<td>
<button class="icon-btn" onclick="toggleDetailRow(${i})"><i class="fa-solid fa-eye"></i></button>
<button class="icon-btn" onclick="yazdirDetay(${i})" title="Yazdır"><i class="fa-solid fa-print"></i></button>
</td>
<td><button class="icon-btn" onclick="sil(${i})"><i class="fa-solid fa-trash"></i></button></td>
</tr>`;
// Detay satırı
let detayHtml="";
p.h.forEach(x=>{detayHtml+=`${x.t} - ${x.tip} - ${x.v} - ${x.tut}₺<br>`;});
liste.innerHTML+=`
<tr id="detail-${i}" class="detail-row" style="display:none;">
<td colspan="10">${detayHtml || "Detay yok"}</td>
</tr>`;
personelSelect.innerHTML+=`<option value="${i}">${p.ad}</option>`;
})
}

function sil(i){if(confirm("Silmek istiyor musunuz?")){data.splice(i,1);save();render();}}

function excel(){
let ws=[["Ad","Tel","Maaş","Mesai","Avans","Dev","Net"]];
data.forEach(p=>{ws.push([p.ad,p.tel,p.maas,p.mesai,p.avans,p.dev,p.net]);});
const wsheet=XLSX.utils.aoa_to_sheet(ws), wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,wsheet,"Personel");
XLSX.writeFile(wb,"personel.xlsx");
}
</script>
</body>
</html>
