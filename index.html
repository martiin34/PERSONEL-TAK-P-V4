<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Takip PRO</title>

<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#2c3e50">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
header{background:#2c3e50;color:white;padding:12px;display:flex;justify-content:space-between;align-items:center;}
button{padding:8px;border:none;background:#3498db;color:white;border-radius:4px;cursor:pointer;margin:2px;}
button:hover{background:#2980b9;}
.container{padding:15px;}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#34495e;color:white;}
.login{max-width:320px;margin:100px auto;background:white;padding:20px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;}
.modal-box{background:white;padding:20px;width:90%;max-width:400px;border-radius:6px;}
</style>

<script>
// 🔐 Firebase config senin bilgilerin
const firebaseConfig = {
  apiKey: "AIzaSyDuT34Y5OH8btCP_nRqgtAl2FA8UtJftwE",
  authDomain: "personel-takip-adc2e.firebaseapp.com",
  projectId: "personel-takip-adc2e",
  storageBucket: "personel-takip-adc2e.firebasestorage.app",
  messagingSenderId: "932699207133",
  appId: "1:932699207133:web:fee2de07e42d94e87af234"
};

firebase.initializeApp(firebaseConfig);
</script>

</head>
<body>

<header>
<h2>Personel Takip PRO</h2>
<div>
<button onclick="excel()">Excel</button>
<button onclick="ayarAc()">⚙ Ayarlar</button>
<button onclick="logout()">Çıkış</button>
</div>
</header>

<div id="loginPage" class="login">
<h3>Giriş</h3>

<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Şifre">

<button onclick="login()">Giriş</button>
<button onclick="register()">Kayıt Ol</button>
<button onclick="sifreReset()">Şifremi Unuttum</button>

</div>

<div id="app" class="container" style="display:none">

<div class="summary">
<div id="topKisi">Personel: 0</div>
<div id="topMaas">Toplam Maaş: 0</div>
</div>

<canvas id="chart" style="max-height:300px;"></canvas>

<hr>
<h3>Personel Ekle</h3>
<input id="ad" placeholder="Ad">
<input id="tel" placeholder="Telefon">
<input id="maas" type="number" placeholder="Maaş">
<button onclick="personelEkle()">Personel Ekle</button>

<hr>
<input id="arama" placeholder="Personel ara..." onkeyup="render()">

<table>
<thead>
<tr><th>Ad</th><th>Telefon</th><th>Maaş</th><th>Net</th><th>İşlem</th></tr>
</thead>
<tbody id="liste"></tbody>
</table>

</div>

<div id="ayarModal" class="modal">
<div class="modal-box">
<h3>Ayarlar</h3>
<button onclick="sifreReset()">Şifre Değiştir</button>
<button onclick="yeniKullanici()">Yeni Kullanıcı Oluştur</button>
<br><br>
<button onclick="ayarKapat()">Kapat</button>
</div>
</div>

<script>
// 📌 Local veriler
let data = JSON.parse(localStorage.getItem("personeller")) || [];

function save(){localStorage.setItem("personeller",JSON.stringify(data));}

// 🎯 Gösterim
function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  render();
}

// 🔐 Login
function login(){
  firebase.auth().signInWithEmailAndPassword(user.value, pass.value)
  .then(u=>{
    if(u.user.emailVerified){
      showApp();
    }else alert("Email doğrulanmamış!");
  }).catch(e=>alert(e.message));
}

// 📝 Kayıt
function register(){
  let email = prompt("Email");
  let passw = prompt("Şifre (min 6 karakter)");
  firebase.auth().createUserWithEmailAndPassword(email, passw)
  .then(u=>{
    u.user.sendEmailVerification();
    alert("Doğrulama maili gönderildi!");
  }).catch(e=>alert(e.message));
}

// 🔑 Şifre sıfırlama
function sifreReset(){
  let email = prompt("Email adresi");
  firebase.auth().sendPasswordResetEmail(email)
  .then(()=>alert("Şifre maili gönderildi"))
  .catch(e=>alert(e.message));
}

// 👤 Yeni Kullanıcı
function yeniKullanici(){
  let email = prompt("Yeni email");
  let passw = prompt("Şifre");
  firebase.auth().createUserWithEmailAndPassword(email, passw)
  .then(u=>{
    u.user.sendEmailVerification();
    alert("Kullanıcı oluşturuldu!");
  }).catch(e=>alert(e.message));
}

// 🔌 Logout
function logout(){
  firebase.auth().signOut();
  location.reload();
}

function ayarAc(){document.getElementById("ayarModal").style.display="flex";}
function ayarKapat(){document.getElementById("ayarModal").style.display="none";}

// 👩‍💼 Personel ekleme
function personelEkle(){
  let p={ad:ad.value, tel:tel.value, maas:Number(maas.value), net:Number(maas.value)};
  data.push(p); save(); render();
  ad.value=""; tel.value=""; maas.value="";
}

// 🗑 Sil
function sil(i){
  if(confirm("Silinsin mi?")){
    data.splice(i,1); save(); render();
  }
}

// 🖥 Render
function render(){
  liste.innerHTML=""; 
  let labels=[], maasData=[];
  let toplamM=0;
  data.forEach((p,i)=>{
    if(!p.ad.toLowerCase().includes(arama.value.toLowerCase())) return;
    liste.innerHTML+=
    `<tr>
      <td>${p.ad}</td>
      <td>${p.tel}</td>
      <td>${p.maas}</td>
      <td>${p.net}</td>
      <td><button onclick="sil(${i})">Sil</button></td>
    </tr>`;
    labels.push(p.ad); maasData.push(p.maas);
    toplamM+=p.maas;
  });
  topKisi.innerText="Personel: "+data.length;
  topMaas.innerText="Toplam Maaş: "+toplamM;

  // Grafik
  new Chart(chart, {
    type:'bar',
    data:{
      labels, datasets:[{label:"Maaş",data:maasData,backgroundColor:'#10b981'}]
    }
  });
}

// 📊 Excel
function excel(){
  const ws_data=[["Ad","Tel","Maaş","Net"]];
  data.forEach(p=>ws_data.push([p.ad,p.tel,p.maas,p.net]));
  const ws=XLSX.utils.aoa_to_sheet(ws_data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Personeller");
  XLSX.writeFile(wb,"personeller.xlsx");
}

</script>

</body>
</html>
