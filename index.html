<!DOCTYPE html>
<html lang="tr">
<head>
<!-- Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<!-- Apple için -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Personel Takip V4">
<link rel="apple-touch-icon" href="icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Takip Paneli V3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#eef2f7;
}

header{
background:#4f46e5;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:1100px;
margin:auto;
padding:12px;
}

.card{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
gap:10px;
}

.grid2{
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
color:white;
}

.btnAdd{background:#10b981}
.btnEdit{background:#f59e0b}
.btnDelete{background:#ef4444}
.btnDetail{background:#3b82f6}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:8px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#f1f5f9;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

.summary div{
background:#f8fafc;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<header>Personel Takip Paneli V3</header>

<div class="container">

<div class="card">

<h3>Dashboard</h3>

<div class="summary">

<div id="toplamPersonel">Personel:0</div>
<div id="toplamMaas">Maaş:0</div>
<div id="toplamMesai">Mesai:0</div>
<div id="toplamNet">Net:0</div>

</div>

<canvas id="chart"></canvas>
<canvas id="pie"></canvas>

</div>


<div class="card">

<h3>Personel Ekle</h3>

<div class="grid grid2">

<div>
<input id="ad" placeholder="Ad Soyad">
<input id="tel" placeholder="Telefon">
<input id="maas" type="number" placeholder="Temel Maaş">
</div>

<div>
<input id="mesaiUcret" type="number" placeholder="Mesai Saat Ücreti">
<input id="kesintiGun" type="number" placeholder="Devamsızlık Günlük Kesinti">
<button class="btnAdd" onclick="personelEkle()">Kaydet</button>
</div>

</div>

</div>


<div class="card">

<h3>İşlem Ekle</h3>

<select id="personelSec"></select>

<select id="islemTip">
<option value="mesai">Mesai</option>
<option value="avans">Avans</option>
<option value="dev">Devamsızlık</option>
</select>

<input id="deger" type="number" placeholder="Saat / Gün / Tutar">

<button class="btnDetail" onclick="islemEkle()">Kaydet</button>

</div>



<div class="card">

<h3>Personel Listesi</h3>

<input id="arama" placeholder="Ara" onkeyup="listeFiltre()">

<table>

<thead>
<tr>
<th>Ad</th>
<th>Telefon</th>
<th>Maaş</th>
<th>Mesai</th>
<th>Avans</th>
<th>Kesinti</th>
<th>Net</th>
<th>Detay</th>
<th>Sil</th>
</tr>
</thead>

<tbody id="liste"></tbody>

</table>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("personel_v3")) || []

function TL(v){
return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY"}).format(v)
}

function kaydet(){
localStorage.setItem("personel_v3",JSON.stringify(data))
}

function personelEkle(){

let p={
ad:ad.value,
tel:tel.value,
maas:+maas.value||0,
mesaiUcret:+mesaiUcret.value||0,
kesGun:+kesintiGun.value||0,
mesai:0,
avans:0,
kes:0
}

data.push(p)

kaydet()
render()

}

function islemEkle(){

let i=personelSec.value
let tip=islemTip.value
let v=+deger.value||0

let p=data[i]

if(tip=="mesai") p.mesai+=v*p.mesaiUcret
if(tip=="avans") p.avans+=v
if(tip=="dev") p.kes+=v*p.kesGun

kaydet()
render()

}

function sil(i){

if(confirm("Silinsin mi")){
data.splice(i,1)
kaydet()
render()
}

}

function render(){

let html=""

let labels=[]
let maaslar=[]
let mesailer=[]
let netler=[]

let tMaas=0
let tMesai=0
let tNet=0

data.forEach((p,i)=>{

let net=p.maas+p.mesai-p.avans-p.kes

tMaas+=p.maas
tMesai+=p.mesai
tNet+=net

labels.push(p.ad)
maaslar.push(p.maas)
mesailer.push(p.mesai)
netler.push(net)

html+=`
<tr>
<td>${p.ad}</td>
<td><a href="tel:${p.tel}">${p.tel}</a></td>
<td>${TL(p.maas)}</td>
<td style="color:#10b981">${TL(p.mesai)}</td>
<td style="color:#f59e0b">${TL(p.avans)}</td>
<td style="color:#ef4444">${TL(p.kes)}</td>
<td><b>${TL(net)}</b></td>
<td><button class="btnDetail">Gör</button></td>
<td><button class="btnDelete" onclick="sil(${i})">Sil</button></td>
</tr>
`

})

liste.innerHTML=html

toplamPersonel.innerText="Personel: "+data.length
toplamMaas.innerText="Toplam Maaş: "+TL(tMaas)
toplamMesai.innerText="Toplam Mesai: "+TL(tMesai)
toplamNet.innerText="Toplam Net: "+TL(tNet)

personelSec.innerHTML=data.map((p,i)=>`<option value="${i}">${p.ad}</option>`).join("")

grafik(labels,maaslar,mesailer,netler)

}

let chart
let pie

function grafik(l,m,me,n){

if(chart) chart.destroy()
if(pie) pie.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:l,
datasets:[
{label:"Maaş",data:m},
{label:"Mesai",data:me},
{label:"Net",data:n}
]
}
})

pie=new Chart(document.getElementById("pie"),{
type:"pie",
data:{
labels:["Maaş","Mesai"],
datasets:[{data:[m.reduce((a,b)=>a+b,0),me.reduce((a,b)=>a+b,0)]}]
}
})

}

function listeFiltre(){

let q=arama.value.toLowerCase()

document.querySelectorAll("#liste tr").forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(q)?"":"none"

})

}

render()

</script>

</body>
</html>
